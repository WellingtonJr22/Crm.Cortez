[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Todas as chamadas /api/* vão para as Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA: qualquer outra rota devolve o index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
